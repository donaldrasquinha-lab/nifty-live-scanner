name: Daily Nifty Update

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-keys:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Update Script
        env:
          API_KEY: ${{ secrets.UPSTOX_API_KEY }}
          API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
        run: python get_nifty_keys.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add nifty50_upstox_keys.csv
          git commit -m "Auto-update Nifty 50 keys" || echo "No changes to commit"
          git push
