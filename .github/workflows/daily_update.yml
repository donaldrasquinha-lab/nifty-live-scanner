on:
  workflow_dispatch:
  schedule:
    - cron: '30 2 * * *'

jobs:
  update-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Tools
        run: pip install pandas requests

      - name: Generate Keys
        env:
          API_KEY: ${{ secrets.UPSTOX_API_KEY }}
          API_SECRET: ${{ secrets.UPSTOX_API_SECRET }}
        run: python get_nifty_keys.py

      - name: Push to GitHub
        run: |
          git config --global user.name "actions-user"
          git config --global user.email "actions@github.com"
          git add nifty50_upstox_keys.csv
          git commit -m "Updated Nifty 50 keys" || exit 0
          git push
