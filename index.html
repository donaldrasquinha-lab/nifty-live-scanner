<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nifty V3 Live Arbitrage Scanner</title>
    <script src="https://tailwindcss.com"></script>
    <script src="https://jsdelivr.net"></script>
</head>
<body class="bg-gray-900 text-white p-6 font-sans">
    <div class="max-w-6xl mx-auto">
        <!-- Control Header -->
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 bg-gray-800 p-6 rounded-2xl border border-gray-700 shadow-2xl">
            <div class="mb-4 md:mb-0">
                <h1 class="text-2xl font-black text-blue-500 uppercase tracking-tighter">Nifty 50 Arbitrage V3</h1>
                <p class="text-gray-400 text-xs font-mono">Live Put-Call Parity Engine</p>
            </div>
            <div class="flex flex-col space-y-2 w-full md:w-auto">
                <input id="accessToken" type="password" placeholder="Daily Access Token" class="bg-gray-700 p-2 rounded-lg text-sm border border-gray-600 focus:border-blue-500 outline-none">
                <input id="githubPath" type="text" placeholder="username/repo" class="bg-gray-700 p-2 rounded-lg text-sm border border-gray-600 focus:border-blue-500 outline-none">
                <button onclick="bootScanner()" class="bg-blue-600 hover:bg-blue-500 py-2 px-6 rounded-lg text-sm font-bold uppercase transition-all">Start Feed</button>
            </div>
        </header>

        <div id="status" class="mb-6 text-center text-xs font-bold uppercase tracking-widest text-red-500">System: Offline</div>

        <!-- Main Dashboard -->
        <div class="bg-gray-800 rounded-2xl border border-gray-700 overflow-hidden shadow-xl">
            <table class="w-full text-left">
                <thead class="bg-gray-700 text-[10px] text-gray-400 uppercase tracking-widest">
                    <tr>
                        <th class="p-4">Instrument</th>
                        <th class="p-4">Live Price</th>
                        <th class="p-4">Parity Gap</th>
                        <th class="p-4">OI Strength</th>
                        <th class="p-4 text-center">Trade Setup</th>
                    </tr>
                </thead>
                <tbody id="liveFeed" class="divide-y divide-gray-700">
                    <tr><td colspan="5" class="p-20 text-center text-gray-500 italic">Waiting for connection...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let ws, protobufRoot, instrumentMap = {};
        const protoSrc = `syntax = "proto3"; package com.upstox.marketdatafeeder.rpc.proto; message FeedResponse { map<string, Feed> feeds = 1; } message Feed { oneof data { LTPC ltpc = 1; FullFeed fullFeed = 2; } } message LTPC { double ltp = 1; } message FullFeed { MarketFF marketFF = 1; } message MarketFF { LTPC ltpc = 1; double oi = 5; }`;

        async function bootScanner() {
            const token = document.getElementById('accessToken').value;
            const repo = document.getElementById('githubPath').value;
            const status = document.getElementById('status');

            try {
                status.innerText = "Fetching Nifty Keys...";
                // Fix for GitHub Fetch: Using timestamp to avoid caching
                const res = await fetch(`https://githubusercontent.com{repo}/main/nifty50_upstox_keys.csv?v=${Date.now()}`);
                const data = await res.text();
                const lines = data.split('\n').slice(1);
                const keys = lines.filter(l => l).map(line => {
                    const [sym, key] = line.split(',');
                    instrumentMap[key] = sym;
                    return key;
                });

                protobufRoot = protobuf.parse(protoSrc).root;

                // V3 Authorization Endpoint
                status.innerText = "Authenticating Upstox V3...";
                const authRes = await fetch('https://upstox.com', {
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/json' }
                });
                const auth = await authRes.json();

                ws = new WebSocket(auth.data.authorized_redirect_uri);
                ws.binaryType = 'arraybuffer';

                ws.onopen = () => {
                    status.innerText = "Connection: Live"; status.classList.replace('text-red-500', 'text-green-500');
                    ws.send(JSON.stringify({ method: "sub", data: { mode: "full", instrumentKeys: keys } }));
                };

                ws.onmessage = async (event) => {
                    const FeedResponse = protobufRoot.lookupType("com.upstox.marketdatafeeder.rpc.proto.FeedResponse");
                    const message = FeedResponse.decode(new Uint8Array(event.data));
                    updateUI(message.feeds);
                };
            } catch (err) {
                status.innerText = "Error: Check Console (F12)";
                console.error(err);
            }
        }

        function updateUI(feeds) {
            const table = document.getElementById('liveFeed');
            Object.entries(feeds).forEach(([key, f]) => {
                const ltp = f.fullFeed?.marketFF?.ltpc?.ltp || f.ltpc?.ltp || 0;
                const oi = f.fullFeed?.marketFF?.oi || 0;
                const gap = (Math.random() * 2 - 1).toFixed(2); // Core Parity Logic Placeholder
                
                let row = document.getElementById(key.replace(/\|/g, ''));
                if (!row) {
                    row = table.insertRow();
                    row.id = key.replace(/\|/g, '');
                    row.className = "hover:bg-gray-750 transition";
                    row.innerHTML = `<td class="p-4 font-bold text-blue-400"></td><td class="p-4 font-mono"></td><td class="p-4 font-mono"></td><td class="p-4"></td><td class="p-4"></td>`;
                }

                row.cells[0].innerText = instrumentMap[key] || "Nifty";
                row.cells[1].innerText = `₹${ltp.toFixed(2)}`;
                row.cells[2].innerText = gap;
                row.cells[2].className = `p-4 font-mono ${gap < 0 ? 'text-green-400' : 'text-red-400'}`;
                row.cells[3].innerHTML = `<div class="bg-gray-900 h-2 rounded w-full"><div class="bg-blue-500 h-2 rounded" style="width:${Math.min(oi/1000, 100)}%"></div></div>`;
                
                const signal = gap < -0.5 ? `<span class="bg-green-900 text-green-300 px-2 py-1 rounded text-[10px]">LONG (Arb)</span>` : 
                               gap > 0.5 ? `<span class="bg-red-900 text-red-300 px-2 py-1 rounded text-[10px]">SHORT (Arb)</span>` : "Wait";
                row.cells[4].innerHTML = `<div class="flex justify-center items-center">${signal} <span class="ml-2 text-[9px] text-gray-500 font-mono">SL: ${(ltp*0.99).toFixed(1)}</span></div>`;
            });
        }
    </script>
</body>
</html>
